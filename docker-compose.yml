services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_DEFAULT_WEIGHT_SIMILARITY: ${NEXT_PUBLIC_DEFAULT_WEIGHT_SIMILARITY}
        NEXT_PUBLIC_DEFAULT_WEIGHT_POPULARITY: ${NEXT_PUBLIC_DEFAULT_WEIGHT_POPULARITY}
        NEXT_PUBLIC_DEFAULT_WEIGHT_RATING: ${NEXT_PUBLIC_DEFAULT_WEIGHT_RATING}
        NEXT_PUBLIC_DEFAULT_WEIGHT_RECENCY: ${NEXT_PUBLIC_DEFAULT_WEIGHT_RECENCY}
        NEXT_PUBLIC_DEFAULT_HALF_LIFE_DAYS: ${NEXT_PUBLIC_DEFAULT_HALF_LIFE_DAYS}
        NEXT_PUBLIC_DEFAULT_MIN_RELEASE_DATE: ${NEXT_PUBLIC_DEFAULT_MIN_RELEASE_DATE}
        NEXT_PUBLIC_DEFAULT_MIN_REVIEW_COUNT: ${NEXT_PUBLIC_DEFAULT_MIN_REVIEW_COUNT}
        NEXT_PUBLIC_DEFAULT_MIN_POSITIVE_PERCENT: ${NEXT_PUBLIC_DEFAULT_MIN_POSITIVE_PERCENT}
        NEXT_PUBLIC_DEFAULT_RECOMMEND_COUNT: ${NEXT_PUBLIC_DEFAULT_RECOMMEND_COUNT}
        NEXT_PUBLIC_CANDIDATE_LIMIT: ${NEXT_PUBLIC_CANDIDATE_LIMIT}
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
